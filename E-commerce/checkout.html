<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - PressMart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="checkout">

<div class="top-bar">
  <div class="left">
    <span><i class="fa-solid fa-envelope"></i> support@pressmart.com</span>
    <span><i class="fa-solid fa-phone"></i> +123 456 789</span>
  </div>
  <div class="center">Welcome to Our Store</div>
</div>

<nav class="navbar">
  <div class="logo">PressMart.</div>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <i class="fa-solid fa-bars"></i>
  </button>
  <ul class="nav-links">
    <li class="active">Home</li>
    <li>Shop</li>
        <li>Blog</li>
    <li>Buy</li>
  </ul>
  <div class="icons">
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-heart"></i>
    <div class="cart-wrap" role="button" aria-label="Open cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-count" aria-hidden="true">0</span>
    </div>
  </div>
</nav>

<section class="checkout-page">
  <div id="checkoutContent">
    <div class="checkout-layout">
      <div class="checkout-form-panel">
        <h2>Customer information</h2>
        <form id="checkoutForm">
        <div class="form-row"><label for="fullName">Full name</label><input id="fullName" name="fullName" required></div>
        <div class="form-row"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
        <div class="form-row"><label for="phone">Phone</label><input id="phone" name="phone" type="tel" required></div>
        <div class="form-row"><label for="address">Address</label><input id="address" name="address" required></div>
        <div class="form-row"><label for="city">City</label><input id="city" name="city" required></div>
        <div class="form-row"><label for="state">State</label><input id="state" name="state" required></div>
        <div class="form-row"><label for="zip">Postal code</label><input id="zip" name="zip" required></div>
        <div class="form-row"><label for="country">Country</label><input id="country" name="country" required></div>
        <p id="checkoutError" class="form-error"></p>
        <button class="btn-primary" type="submit">Continue to Payment</button>
      </form>
    </div>
    <aside class="checkout-summary-panel">
      <h3>Order summary</h3>
      <div id="checkoutSummary" class="order-summary-list"></div>
      <div class="order-summary-footer">
        <div><span>Subtotal</span><span id="checkoutSubtotal">$0.00</span></div>
        <div><span>Shipping</span><span id="checkoutShipping">$0.00</span></div>
        <div><span>Tax</span><span id="checkoutTax">$0.00</span></div>
        <div class="order-summary-total"><strong>Total</strong><strong id="checkoutTotal">$0.00</strong></div>
      </div>
    </aside>
  </div>
</section>

<footer><p>© 2026 PressMart. All rights reserved.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="app.js"></script>
</body>
</html>
