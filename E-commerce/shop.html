<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - PressMart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">

<div class="top-bar">
  <div class="left">
    <span><i class="fa-solid fa-envelope"></i> support@pressmart.com</span>
    <span><i class="fa-solid fa-phone"></i> +123 456 789</span>
  </div>
  <div class="center">Welcome to Our Store</div>
</div>

<nav class="navbar">
  <div class="logo">PressMart.</div>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <i class="fa-solid fa-bars"></i>
  </button>
  <ul class="nav-links">
    <li>Home</li>
    <li class="active">Shop</li>
        <li>Blog</li>
    <li>Buy</li>
  </ul>
  <div class="icons">
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-heart"></i>
    <div class="cart-wrap" role="button" aria-label="View cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-count" aria-hidden="true">0</span>
    </div>
  </div>
</nav>

<section class="page-hero page-hero-compact">
  <span class="badge accent">Shop Collection</span>
  <h1>Browse the full PressMart catalog</h1>
  <p>Filter by category, sort by price, and find the perfect item in seconds.</p>
</section>

<section class="shop-page">
  <aside class="shop-filters">
    <div class="filter-panel">
      <h3>Filters</h3>
      <div class="filter-group">
        <label for="shopCategoryFilter">Category</label>
        <select id="shopCategoryFilter"><option value="">All Categories</option></select>
      </div>
      <div class="filter-group">
        <label for="shopSort">Sort by</label>
        <select id="shopSort">
          <option value="price-asc" selected>Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="featured">Featured</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      <button id="shopClearFilters" class="btn-outline">Reset filters</button>
    </div>
  </aside>
  <div class="shop-products-panel">
    <div class="product-grid" id="shopProducts"></div>
  </div>
</section>

<footer><p>© 2026 PressMart. All rights reserved.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="app.js"></script>
</body>
</html>
