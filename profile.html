<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - PressMart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">

<!-- TOP BAR -->
<div class="top-bar">
  <div class="left">
    <span><i class="fa-solid fa-envelope"></i> support@pressmart.com</span>
    <span><i class="fa-solid fa-phone"></i> +123 456 789</span>
  </div>
  <div class="center">Welcome to Our Store</div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">PressMart.</div>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <i class="fa-solid fa-bars"></i>
  </button>
  <ul class="nav-links">
    <li>Home</li>
    <li>Shop</li>
    <li>Blog</li>
    <li>Buy</li>
  </ul>
  <div class="icons">
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-heart"></i>
    <div class="cart-wrap" role="button" aria-label="Open cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-count" aria-hidden="true">0</span>
    </div>
    <a href="adminlogin.html" class="admin-btn">Admin</a>
  </div>
</nav>

<!-- PROFILE CONTAINER -->
<main class="profile-page-container">
  <!-- Sidebar -->
  <aside class="profile-sidebar">
    <div class="profile-avatar-large" id="sidebarAvatar">C</div>
    <h3 id="sidebarName">Customer Name</h3>
    <p id="sidebarEmail">customer@example.com</p>
    
    <nav class="profile-nav">
      <button class="profile-nav-item active" data-panel="profile-details-panel">
        <i class="fa-solid fa-user"></i> Profile Details
      </button>
      <button class="profile-nav-item" data-panel="profile-orders-panel">
        <i class="fa-solid fa-bag-shopping"></i> Order History
      </button>
      <button class="profile-nav-item" data-panel="logout">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </nav>
  </aside>

  <!-- Content panels -->
  <section class="profile-panels">
    <!-- Details Panel -->
    <div class="profile-content-panel active" id="profile-details-panel">
      <h2>Profile Details</h2>
      <form id="profileForm" class="settings-form">
        <div class="form-row">
          <label for="profileName">Full Name</label>
          <input type="text" id="profileName" required>
        </div>
        <div class="form-row">
          <label for="profileEmail">Email Address</label>
          <input type="email" id="profileEmail" required>
        </div>
        <div class="form-row">
          <label for="profilePhone">Mobile Number</label>
          <input type="tel" id="profilePhone">
        </div>
        <button type="submit" class="btn-primary" style="margin-top:16px;">Save Changes</button>
      </form>
    </div>

    <!-- Orders Panel -->
    <div class="profile-content-panel" id="profile-orders-panel">
      <h2>Order History</h2>
      <div class="profile-orders-list" id="profileOrders">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </section>
</main>

<!-- FOOTER -->
<footer>
  <p>© 2026 PressMart. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="app.js"></script>
</body>
</html>
