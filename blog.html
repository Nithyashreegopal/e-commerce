<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - PressMart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="blog">

<div class="top-bar">
  <div class="left">
    <span><i class="fa-solid fa-envelope"></i> support@pressmart.com</span>
    <span><i class="fa-solid fa-phone"></i> +123 456 789</span>
  </div>
  <div class="center">Welcome to Our Store</div>
</div>

<nav class="navbar">
  <div class="logo">PressMart.</div>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <i class="fa-solid fa-bars"></i>
  </button>
  <ul class="nav-links">
    <li>Home</li>
    <li>Shop</li>
        <li class="active">Blog</li>
    <li>Buy</li>
  </ul>
  <div class="icons">
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-heart"></i>
    <div class="cart-wrap" role="button" aria-label="View cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-count" aria-hidden="true">0</span>
    </div>
  </div>
</nav>

<section class="page-hero page-hero-compact">
  <span class="badge accent">Blog</span>
  <h1>Fashion tips, product guides and shopping ideas</h1>
  <p>Read the latest from PressMart and discover style inspiration for every season.</p>
</section>

<section class="blog-list page-section">
  <div id="blogList" class="blog-grid"></div>
</section>

<footer><p>© 2026 PressMart. All rights reserved.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="app.js"></script>
</body>
</html>
